{% extends "base.html" %}
{% block page_title %}خەرجی{% endblock %}
{% block content %}
<section class="panel">
  <h2>زیادکردنی خەرجی</h2>
  <form method="post" class="form grid-form">
    <input name="title" placeholder="ناوی خەرجی" required>
    <input name="amount" type="number" step="0.01" placeholder="بڕ" required>
    <input name="category" placeholder="جۆر: کرێ، کارەبا، مووچە...">
    <input name="note" placeholder="تێبینی">
    <button>زیاد بکە</button>
  </form>
</section>
<section class="panel">
  <h2>خەرجیەکان</h2>
  <table>
    <thead><tr><th>ناو</th><th>بڕ</th><th>جۆر</th><th>تێبینی</th><th>کات</th></tr></thead>
    <tbody>
      {% for e in expenses %}
      <tr><td>{{ e.title }}</td><td>{{ e.amount|money }}</td><td>{{ e.category }}</td><td>{{ e.note }}</td><td>{{ e.created_at }}</td></tr>
      {% else %}<tr><td colspan="5">خەرجی نییە</td></tr>{% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
